name: Suggestion
description: Propose an improvement to the codebook, exercises, or docs
labels: ["enhancement"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to change?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why does it matter?
      description: How does this help workshop participants or readers?
