name: Bug report
description: Something in the workshop materials doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ran `python exercises/exercise_B_pipeline.py`
        2. Got error ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and Python version
      placeholder: macOS 14.5, Python 3.11.6
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      render: shell
