name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytest

      - name: Validate sample CSVs parse
        run: |
          python - <<'PY'
          import pandas as pd, sys
          for f in ["data/sample_manifestos.csv", "data/annotation_practice.csv"]:
              df = pd.read_csv(f)
              assert len(df) > 0, f"{f} is empty"
              print(f, df.shape)
          PY

      - name: Verify exercise scripts import
        run: |
          python -m py_compile exercises/exercise_B_pipeline.py exercises/exercise_C_validate.py
